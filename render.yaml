services:
  - type: web
    name: proposallock
    runtime: node
    plan: free
    nodeVersion: "22.11.0"
    buildCommand: npm install
    startCommand: node src/index.ts
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LEMONSQUEEZY_API_KEY
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        sync: false
      - key: LEMONSQUEEZY_PRODUCT_ID
        sync: false
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LS_CHECKOUT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
