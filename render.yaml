services:
  - type: web
    name: proposallock
    runtime: node
    buildCommand: "npm install"
    startCommand: "bun src/index.ts"
    envVars:
      - key: PORT
        value: 10000
      - key: BASE_URL
        fromService:
          type: web
          name: proposallock
          property: host
      - key: LS_API_KEY
        sync: false
      - key: LS_VARIANT_ID
        value: "1407717"
      - key: LS_WEBHOOK_SECRET
        sync: false
      - key: LEMONSQUEEZY_STORE_ID
        value: "312605"
      - key: LEMONSQUEEZY_STORE_URL
        value: "https://agentos-store.lemonsqueezy.com"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
