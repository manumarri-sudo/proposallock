<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" fill="none">
  <rect width="1600" height="300" fill="#09090B"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="300" fill="url(#grid)"/>
  <rect x="0" y="100" width="1600" height="100" fill="url(#glow)"/>
</svg>
